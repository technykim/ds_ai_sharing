<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#3d6a4b" />
    <meta name="description" content="동숭나눔터는 소속 교구의 이웃들과 신뢰를 기반으로 육아 교구, 아동 도서, 유아용품 등을 간편하게 무료 나눔하고 1:1 채팅으로 거래할 수 있는 친환경 PWA 중고 거래 서비스입니다." />
    
    <!-- PWA Link -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    
    <title>동숭나눔터 | 이웃과 함께하는 친환경 중고 물건 나눔</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('서비스 워커 등록 성공:', reg.scope))
            .catch((err) => console.log('서비스 워커 등록 실패:', err));
        });
      }
    </script>
  </body>
</html>
